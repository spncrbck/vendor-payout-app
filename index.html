<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vendor Payout Reports — Alpenglow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green:       #008060;
      --green-dark:  #006048;
      --green-light: #e6f4f0;
      --red:         #c0392b;
      --red-light:   #fdecea;
      --blue:        #3b5bdb;
      --blue-light:  #e8eeff;
      --amber:       #b45309;
      --amber-light: #fef9ee;
      --bg:          #f2f4f7;
      --surface:     #ffffff;
      --border:      #e2e5ea;
      --border-soft: #f0f2f5;
      --text:        #1c2033;
      --text-muted:  #6b7280;
      --text-faint:  #9ca3af;
      --radius:      10px;
      --radius-sm:   6px;
      --shadow-sm:   0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
      --shadow:      0 4px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.04);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ────────────────────────────────────────── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: var(--shadow-sm);
    }
    .app-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .app-logo-mark {
      width: 30px; height: 30px;
      background: var(--green);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
    }
    .app-logo-mark svg { width: 16px; height: 16px; fill: #fff; }
    .app-logo-name { font-weight: 700; font-size: 15px; color: var(--text); letter-spacing: -0.2px; }
    .app-logo-sep  { color: var(--border); font-size: 18px; }
    .app-logo-sub  { font-size: 13px; color: var(--text-muted); font-weight: 400; }

    /* ── LAYOUT ────────────────────────────────────────── */
    .app { max-width: 1040px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

    /* ── TABS ──────────────────────────────────────────── */
    .tab-bar {
      display: flex;
      gap: 0.25rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.75rem;
    }
    .tab {
      padding: 0.65rem 1.1rem;
      font-size: 13.5px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--green); border-bottom-color: var(--green); }

    /* ── CARDS ─────────────────────────────────────────── */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      padding: 1.35rem 1.5rem;
      margin-bottom: 1rem;
      box-shadow: var(--shadow-sm);
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: var(--text-muted);
      margin-bottom: 1.1rem;
    }

    /* ── CONTROLS ──────────────────────────────────────── */
    .controls { display: flex; gap: 0.75rem; align-items: flex-end; flex-wrap: wrap; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--text-muted); margin-bottom: 0.35rem; text-transform: uppercase; letter-spacing: .4px; }
    select, input[type="date"], input[type="number"], input[type="text"] {
      font-size: 13.5px;
      padding: 0.52rem 0.85rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    select:focus, input:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(0,128,96,.12); }

    /* ── BUTTONS ───────────────────────────────────────── */
    button { font-family: inherit; cursor: pointer; border: none; transition: background .15s, transform .08s; }
    .btn-primary {
      background: var(--green); color: #fff;
      font-size: 13.5px; font-weight: 600;
      padding: 0.55rem 1.3rem;
      border-radius: var(--radius-sm);
      box-shadow: 0 1px 2px rgba(0,128,96,.3);
    }
    .btn-primary:hover { background: var(--green-dark); }
    .btn-primary:active { transform: translateY(1px); }
    .btn-primary:disabled { background: #c4c9d0; box-shadow: none; cursor: not-allowed; }
    .btn-secondary {
      background: var(--surface); color: var(--text);
      font-size: 13px; font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-sm);
      border: 1.5px solid var(--border);
    }
    .btn-secondary:hover { background: var(--bg); }
    .btn-sm { font-size: 12px; font-weight: 500; padding: 0.35rem 0.85rem; border-radius: var(--radius-sm); }
    .btn-ghost {
      background: none; color: var(--text-muted);
      font-size: 12px; padding: 0.3rem 0.6rem;
      border-radius: var(--radius-sm);
      border: 1px solid transparent;
    }
    .btn-ghost:hover { background: var(--bg); color: var(--text); border-color: var(--border); }

    /* ── METRICS ───────────────────────────────────────── */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 0.85rem;
      margin-bottom: 1.25rem;
    }
    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--border);
      border-radius: var(--radius);
      padding: 1.1rem 1.25rem;
      box-shadow: var(--shadow-sm);
    }
    .metric.m-green { border-left-color: var(--green); }
    .metric.m-red   { border-left-color: var(--red); }
    .metric.m-blue  { border-left-color: var(--blue); }
    .metric-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; color: var(--text-muted); margin-bottom: 0.4rem; }
    .metric-value { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
    .metric-value.green { color: var(--green); }
    .metric-value.red   { color: var(--red); }

    /* ── VENDOR CARDS ──────────────────────────────────── */
    .vendor-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 1rem;
      overflow: hidden;
      box-shadow: var(--shadow);
    }
    .vendor-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.1rem 1.4rem;
      border-bottom: 1px solid var(--border-soft);
      background: #fafbfc;
    }
    .vendor-name { font-weight: 700; font-size: 15px; }
    .vendor-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .vendor-actions { display: flex; gap: 0.5rem; align-items: center; }
    .vendor-body { padding: 1.25rem 1.4rem; }

    /* ── PAYOUT GRID ───────────────────────────────────── */
    .payout-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .payout-cell { background: var(--bg); border-radius: 8px; padding: 0.75rem 1rem; }
    .payout-cell.highlight { background: var(--green-light); }
    .pl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .4px; color: var(--text-muted); margin-bottom: 0.3rem; }
    .pv { font-size: 1.05rem; font-weight: 700; }
    .pv.green { color: var(--green); }
    .pv.red   { color: var(--red); }

    /* ── TABLE ─────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead { background: #f7f8fa; }
    th {
      text-align: left;
      padding: 0.6rem 0.9rem;
      font-size: 11.5px; font-weight: 600;
      text-transform: uppercase; letter-spacing: .4px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    td { padding: 0.6rem 0.9rem; border-bottom: 1px solid var(--border-soft); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: #f9fafb; }
    td.num { text-align: right; font-variant-numeric: tabular-nums; }
    th.num { text-align: right; }

    /* ── BADGES ────────────────────────────────────────── */
    .badge {
      display: inline-block;
      font-size: 11px; font-weight: 600;
      padding: 0.18rem 0.55rem;
      border-radius: 99px; letter-spacing: .2px; white-space: nowrap;
    }
    .badge-cash  { background: var(--green-light); color: var(--green-dark); }
    .badge-card  { background: #f0f0f5;            color: #444; }
    .badge-modified { background: var(--amber-light); color: var(--amber); font-size: 10px; padding: 0.12rem 0.45rem; }

    /* ── SETTINGS TABLE ────────────────────────────────── */
    .settings-table { width: 100%; border-collapse: collapse; }
    .settings-table th {
      text-align: left; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: .5px;
      color: var(--text-muted); padding: 0 0.75rem 0.6rem;
      border-bottom: 1px solid var(--border);
    }
    .settings-table td { padding: 0.7rem 0.75rem; border-bottom: 1px solid var(--border-soft); vertical-align: middle; }
    .settings-table tbody tr:last-child td { border-bottom: none; }
    .settings-table tbody tr:hover td { background: #fafbfc; }
    .settings-vendor-name { font-weight: 600; font-size: 13.5px; }
    .settings-shopify-val { font-size: 11px; color: var(--text-faint); margin-top: 2px; }

    /* Toggle/Checkbox styling */
    .toggle-wrap { display: flex; align-items: center; gap: 0.5rem; }
    .toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle-slider {
      position: absolute; inset: 0;
      background: #d1d5db; border-radius: 20px;
      cursor: pointer; transition: background .2s;
    }
    .toggle-slider::before {
      content: '';
      position: absolute; width: 14px; height: 14px;
      left: 3px; top: 3px;
      background: #fff; border-radius: 50%;
      transition: transform .2s;
      box-shadow: 0 1px 2px rgba(0,0,0,.2);
    }
    .toggle input:checked + .toggle-slider { background: var(--green); }
    .toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
    .toggle-label { font-size: 13px; color: var(--text-muted); }
    .toggle input:checked ~ .toggle-label { color: var(--text); }

    /* ── DATE PRESETS ───────────────────────────────────── */
    .date-presets { display: flex; gap: 0.35rem; flex-wrap: wrap; margin-top: 0.65rem; }
    .btn-preset {
      font-size: 11.5px; font-weight: 600;
      padding: 0.28rem 0.7rem;
      border-radius: 99px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: background .12s, border-color .12s, color .12s;
    }
    .btn-preset:hover { background: var(--green-light); border-color: #9ddfd0; color: var(--green-dark); }
    .btn-preset.active { background: var(--green-light); border-color: #9ddfd0; color: var(--green-dark); }

    /* ── MISC ──────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--border-soft); margin: 1.1rem 0; }
    .empty { text-align: center; padding: 2.5rem; color: var(--text-muted); font-size: 13.5px; }
    .info-banner {
      background: var(--blue-light); border: 1px solid #c5d0f5;
      border-radius: var(--radius-sm); padding: 0.7rem 1rem;
      color: var(--blue); font-size: 12.5px; margin-bottom: 1.25rem;
    }
    .error-banner {
      background: var(--red-light); border: 1px solid #f5c6c2;
      border-radius: var(--radius-sm); padding: 0.75rem 1rem;
      color: var(--red); font-size: 13px; margin-bottom: 1rem;
    }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.5); border-top-color: #fff;
      border-radius: 50%; animation: spin .6s linear infinite;
      vertical-align: middle; margin-right: 0.5rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 640px) {
      .app-header { padding: 0 1rem; }
      .app { padding: 1.25rem 1rem 3rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .vendor-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
      .payout-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <a class="app-logo" href="#">
    <div class="app-logo-mark">
      <svg viewBox="0 0 20 20"><path d="M10 2L3 7v11h5v-5h4v5h5V7L10 2z"/></svg>
    </div>
    <span class="app-logo-name">Alpenglow</span>
    <span class="app-logo-sep">|</span>
    <span class="app-logo-sub">Vendor Payouts</span>
  </a>
</header>

<div class="app">
  <div class="tab-bar">
    <button class="tab active" onclick="showTab('report')">Payout Report</button>
    <button class="tab" onclick="showTab('settings')">Vendor Settings</button>
  </div>

  <!-- ── REPORT TAB ───────────────────────────────────── -->
  <div id="tab-report">
    <div class="card">
      <div class="controls">
        <div><label>From</label><input type="date" id="dateFrom" onchange="clearActivePreset()" /></div>
        <div><label>To</label><input type="date" id="dateTo" onchange="clearActivePreset()" /></div>
        <div>
          <label>Vendor</label>
          <select id="vendorFilter"><option value="all">All vendors</option></select>
        </div>
        <button class="btn-primary" id="generateBtn" onclick="generateReport()">Generate report</button>
      </div>
      <div class="date-presets">
        <span style="font-size:11px;font-weight:600;color:var(--text-faint);letter-spacing:.4px;text-transform:uppercase;align-self:center;margin-right:0.15rem;">Quick:</span>
        <button class="btn-preset" id="preset-prev-month" onclick="setDateRange('prev-month')">Prev Month</button>
        <button class="btn-preset" id="preset-ytd"        onclick="setDateRange('ytd')">Year to Date</button>
        <button class="btn-preset" id="preset-q1"         onclick="setDateRange('q1')">Q1</button>
        <button class="btn-preset" id="preset-q2"         onclick="setDateRange('q2')">Q2</button>
        <button class="btn-preset" id="preset-q3"         onclick="setDateRange('q3')">Q3</button>
        <button class="btn-preset" id="preset-q4"         onclick="setDateRange('q4')">Q4</button>
      </div>
    </div>
    <div id="errorBanner" class="error-banner" style="display:none"></div>
    <div id="metricsBar" class="metrics" style="display:none"></div>
    <div id="vendorCards"></div>
  </div>

  <!-- ── SETTINGS TAB ─────────────────────────────────── -->
  <div id="tab-settings" style="display:none">
    <div class="card">
      <div class="card-title">Vendor Settings</div>
      <div class="info-banner">
        Settings are saved in this browser. Commission rate defaults to the value in Shopify but can be overridden here.
        Changes take effect the next time you generate a report.
      </div>
      <div id="settingsContent"><p class="empty">Loading vendors from Shopify…</p></div>
    </div>
  </div>
</div>

<script>
var WORKER_URL  = "https://vendor-payout.spencer-739.workers.dev";
var FEE_FLAT    = 0.00;
var FEE_RATE    = 0.027;
var ALPENGLOW_VENDOR = "Alpenglow";

// Loaded from Shopify: { "Vendor Name": { alpenglowKeeps: 30 } }
var shopifyVendors = {};

// localStorage overrides: { "Vendor Name": { commissionRate: 30, passAlongTax: true } }
var vendorSettings = {};

window.addEventListener("DOMContentLoaded", function() {
  loadVendorSettings();
  initDateRange();
  loadVendors();
});

/* ── SETTINGS PERSISTENCE ───────────────────────────── */
function loadVendorSettings() {
  try { vendorSettings = JSON.parse(localStorage.getItem("alpenglow_vendor_settings") || "{}"); }
  catch(e) { vendorSettings = {}; }
}

function saveVendorSettings() {
  localStorage.setItem("alpenglow_vendor_settings", JSON.stringify(vendorSettings));
}

// Returns effective settings for a vendor, merging Shopify defaults + local overrides
function getVendorSetting(name) {
  var ls      = vendorSettings[name] || {};
  var shopify = shopifyVendors[name] || {};
  var shopifyRate = shopify.alpenglowKeeps !== undefined ? shopify.alpenglowKeeps : 0;
  return {
    commissionRate: ls.commissionRate !== undefined ? ls.commissionRate : shopifyRate,
    passAlongTax:   ls.passAlongTax   !== undefined ? ls.passAlongTax   : true,
    shopifyRate:    shopifyRate,
    isModified:     ls.commissionRate !== undefined && ls.commissionRate !== shopifyRate
  };
}

/* ── TAB SWITCHING ──────────────────────────────────── */
function showTab(tab) {
  document.getElementById("tab-report").style.display   = tab === "report"   ? "" : "none";
  document.getElementById("tab-settings").style.display = tab === "settings" ? "" : "none";
  document.querySelectorAll(".tab").forEach(function(el, i) {
    el.classList.toggle("active", (i === 0 && tab === "report") || (i === 1 && tab === "settings"));
  });
  if (tab === "settings") renderSettingsTab();
}

/* ── VENDOR LOADING ─────────────────────────────────── */
function loadVendors() {
  apiFetch("/vendors").then(function(data) {
    var filter = document.getElementById("vendorFilter");
    var cur = filter.value;
    filter.innerHTML = '<option value="all">All vendors</option>';
    (data.vendors || []).forEach(function(v) {
      shopifyVendors[v.name] = { alpenglowKeeps: v.alpenglowKeeps };
      var o = document.createElement("option");
      o.value = v.name; o.textContent = v.name;
      if (v.name === cur) o.selected = true;
      filter.appendChild(o);
    });
  }).catch(function(e) {
    showError("Could not load vendor list from Shopify: " + e.message);
  });
}

/* ── SETTINGS TAB RENDER ────────────────────────────── */
function renderSettingsTab() {
  var names = Object.keys(shopifyVendors).sort();
  if (!names.length) {
    document.getElementById("settingsContent").innerHTML = '<p class="empty">No vendors found. Make sure Shopify collections have vendor rules configured.</p>';
    return;
  }

  var rows = names.map(function(name) {
    var s = getVendorSetting(name);
    var safeName = name.replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    var modBadge = s.isModified ? '<span class="badge badge-modified">Modified</span>' : '';
    return '<tr>' +
      '<td><div class="settings-vendor-name">' + name + ' ' + modBadge + '</div>' +
           '<div class="settings-shopify-val">Shopify: ' + s.shopifyRate + '%</div></td>' +
      '<td>' +
        '<div style="display:flex;align-items:center;gap:0.5rem;">' +
          '<input type="number" min="0" max="100" value="' + s.commissionRate + '" style="width:72px" ' +
            'onchange="updateCommissionRate(\'' + safeName + '\',this.value)" />' +
          '<span style="font-size:12px;color:var(--text-muted);">% Alpenglow keeps</span>' +
          (s.isModified ? ' <button class="btn-ghost" title="Reset to Shopify value" onclick="resetCommissionRate(\'' + safeName + '\')">↺ Reset</button>' : '') +
        '</div>' +
      '</td>' +
      '<td>' +
        '<label class="toggle" title="Include tax in vendor payout">' +
          '<input type="checkbox"' + (s.passAlongTax ? ' checked' : '') + ' onchange="updatePassAlongTax(\'' + safeName + '\',this.checked)" />' +
          '<span class="toggle-slider"></span>' +
        '</label>' +
      '</td>' +
      '</tr>';
  }).join('');

  document.getElementById("settingsContent").innerHTML =
    '<table class="settings-table">' +
      '<thead><tr><th>Vendor</th><th>Commission Rate</th><th>Pass Along Tax</th></tr></thead>' +
      '<tbody>' + rows + '</tbody>' +
    '</table>';
}

function updateCommissionRate(name, val) {
  var rate = Math.min(100, Math.max(0, parseInt(val) || 0));
  if (!vendorSettings[name]) vendorSettings[name] = {};
  vendorSettings[name].commissionRate = rate;
  saveVendorSettings();
  renderSettingsTab();
}

function resetCommissionRate(name) {
  if (vendorSettings[name]) delete vendorSettings[name].commissionRate;
  saveVendorSettings();
  renderSettingsTab();
}

function updatePassAlongTax(name, checked) {
  if (!vendorSettings[name]) vendorSettings[name] = {};
  vendorSettings[name].passAlongTax = checked;
  saveVendorSettings();
}

/* ── DATE INIT ──────────────────────────────────────── */
function initDateRange() {
  var now = new Date();
  var firstOfLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
  var lastOfLastMonth  = new Date(now.getFullYear(), now.getMonth(), 0);
  document.getElementById("dateFrom").value = isoDate(firstOfLastMonth);
  document.getElementById("dateTo").value   = isoDate(lastOfLastMonth);
}

function isoDate(d) {
  return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
}

/* ── REPORT ─────────────────────────────────────────── */
function generateReport() {
  var btn = document.getElementById("generateBtn");
  var dateFrom = document.getElementById("dateFrom").value;
  var dateTo   = document.getElementById("dateTo").value;
  if (!dateFrom || !dateTo) { showError("Please select a From and To date."); return; }
  if (dateFrom > dateTo)    { showError("From date must be before To date."); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Loading…';
  showError(null);
  document.getElementById("metricsBar").style.display = "none";
  document.getElementById("vendorCards").innerHTML = "";

  apiFetch("/orders?start_date=" + dateFrom + "&end_date=" + dateTo).then(function(data) {
    renderReport(data);
  }).catch(function(e) {
    showError(e.message);
  }).finally(function() {
    btn.disabled = false;
    btn.textContent = "Generate report";
  });
}

function renderReport(data) {
  var filterVendor = document.getElementById("vendorFilter").value;
  var processed    = (data.orders || []).map(processOrder);
  var summaries    = buildSummaries(processed);
  var allVendors   = Object.values(summaries);
  var activeVendors = filterVendor === "all"
    ? allVendors
    : allVendors.filter(function(s) { return s.vendor === filterVendor; });

  if (!activeVendors.length) {
    document.getElementById("vendorCards").innerHTML =
      '<div class="card"><p class="empty">No vendor sales found for this period.</p></div>';
    return;
  }

  var totalPayout     = activeVendors.reduce(function(s,v) { return s+v.netPayout; }, 0);
  var totalFees       = activeVendors.reduce(function(s,v) { return s+v.processingFees; }, 0);
  var totalGross      = activeVendors.reduce(function(s,v) { return s+v.grossSales; }, 0);
  var totalReturns    = activeVendors.reduce(function(s,v) { return s+v.totalReturns; }, 0);
  var totalCommission = activeVendors.reduce(function(s,v) { return s+v.alpenglowCommission; }, 0);

  var metrics = document.getElementById("metricsBar");
  metrics.style.display = "grid";
  metrics.innerHTML =
    '<div class="metric m-blue"><div class="metric-label">Gross sales</div><div class="metric-value">' + fmt(totalGross) + '</div></div>' +
    (totalReturns > 0 ? '<div class="metric m-red"><div class="metric-label">Returns</div><div class="metric-value red">−' + fmt(totalReturns) + '</div></div>' : '') +
    '<div class="metric m-red"><div class="metric-label">Processing fees</div><div class="metric-value red">−' + fmt(totalFees) + '</div></div>' +
    (totalCommission > 0 ? '<div class="metric m-red"><div class="metric-label">Commission</div><div class="metric-value red">−' + fmt(totalCommission) + '</div></div>' : '') +
    '<div class="metric m-green"><div class="metric-label">Total payout owed</div><div class="metric-value green">' + fmt(totalPayout) + '</div></div>';

  var cardsHtml = "";
  activeVendors.forEach(function(v) {
    var orderRows = "";
    processed.filter(function(o) { return o.vendorData[v.vendor]; }).forEach(function(o) {
      var d = o.vendorData[v.vendor];
      var paymentBadge = o.paymentTag === "cash" ? '<span class="badge badge-cash">Cash</span>'
                       : o.paymentTag === "card" ? '<span class="badge badge-card">Card</span>'
                       : '—';
      orderRows +=
        '<tr>' +
        '<td style="font-weight:600">' + o.orderId + '</td>' +
        '<td style="color:var(--text-muted)">' + o.date + '</td>' +
        '<td>' + paymentBadge + '</td>' +
        '<td class="num">' + fmt(d.sub) + '</td>' +
        '<td class="num" style="color:' + (d.taxIncluded ? 'inherit' : 'var(--text-faint)') + '">' + (d.taxIncluded ? fmt(d.taxShare) : '<span title="Tax not passed along">—</span>') + '</td>' +
        '<td class="num" style="color:var(--red)">' + (d.totalFeeShare > 0 ? '−' + fmt(d.totalFeeShare) : '—') + '</td>' +
        '<td class="num" style="color:var(--red)">' + (d.discountShare > 0 ? '−' + fmt(d.discountShare) : '—') + '</td>' +
        '<td class="num" style="color:var(--red)">' + (d.returnShare > 0 ? '−' + fmt(d.returnShare) : '—') + '</td>' +
        '<td class="num" style="color:var(--red)">' + (d.commission > 0 ? '−' + fmt(d.commission) : '—') + '</td>' +
        '<td class="num" style="font-weight:700;color:var(--green)">' + fmt(d.netPayout) + '</td>' +
        '</tr>';
    });

    var s = getVendorSetting(v.vendor);
    var metaStr = s.commissionRate > 0
      ? s.commissionRate + '% commission &nbsp;·&nbsp; ' + v.orderCount + ' order' + (v.orderCount !== 1 ? 's' : '')
      : 'Pass-through &nbsp;·&nbsp; ' + v.orderCount + ' order' + (v.orderCount !== 1 ? 's' : '');

    cardsHtml +=
      '<div class="vendor-card">' +
        '<div class="vendor-header">' +
          '<div><div class="vendor-name">' + v.vendor + '</div><div class="vendor-meta">' + metaStr + '</div></div>' +
          '<div class="vendor-actions">' +
            '<button class="btn-secondary btn-sm" onclick="downloadCSV(\'' + v.vendor + '\',' + JSON.stringify(processed) + ')">↓ CSV</button>' +
            '<button class="btn-secondary btn-sm" onclick="downloadPDF(\'' + v.vendor + '\',' + JSON.stringify(processed) + ')">↓ PDF</button>' +
          '</div>' +
        '</div>' +
        '<div class="vendor-body">' +
          '<div class="payout-grid">' +
            '<div class="payout-cell"><div class="pl">Gross sales</div><div class="pv">' + fmt(v.grossSales) + '</div></div>' +
            (v.taxCollected > 0 ? '<div class="payout-cell"><div class="pl">Tax passed along</div><div class="pv">' + fmt(v.taxCollected) + '</div></div>' : '') +
            '<div class="payout-cell"><div class="pl">Processing fees</div><div class="pv red">' + (v.processingFees > 0 ? '−' + fmt(v.processingFees) : '—') + '</div></div>' +
            (v.totalDiscounts > 0 ? '<div class="payout-cell"><div class="pl">Discounts</div><div class="pv red">−' + fmt(v.totalDiscounts) + '</div></div>' : '') +
            (v.totalReturns > 0   ? '<div class="payout-cell"><div class="pl">Returns</div><div class="pv red">−' + fmt(v.totalReturns) + '</div></div>' : '') +
            (v.alpenglowCommission > 0 ? '<div class="payout-cell"><div class="pl">Commission</div><div class="pv red">−' + fmt(v.alpenglowCommission) + '</div></div>' : '') +
            '<div class="payout-cell highlight"><div class="pl">Net payout</div><div class="pv green">' + fmt(v.netPayout) + '</div></div>' +
          '</div>' +
          '<hr class="divider">' +
          '<div class="table-wrap"><table>' +
            '<thead><tr>' +
              '<th>Order</th><th>Date</th><th>Payment</th>' +
              '<th class="num">Subtotal</th><th class="num">Tax</th><th class="num">Fee</th>' +
              '<th class="num">Discount</th><th class="num">Return</th><th class="num">Commission</th><th class="num">Net</th>' +
            '</tr></thead>' +
            '<tbody>' + orderRows + '</tbody>' +
          '</table></div>' +
        '</div>' +
      '</div>';
  });

  document.getElementById("vendorCards").innerHTML = cardsHtml;
}

/* ── ORDER PROCESSING ───────────────────────────────── */
function processOrder(order) {
  var lines = order.line_items || [];
  var vs = {};
  var lineItemVendor = {};
  lines.forEach(function(item) {
    var v = item.vendor || "Unknown";
    vs[v] = (vs[v] || 0) + parseFloat(item.price) * item.quantity;
    lineItemVendor[item.id] = v;
  });

  // Tally refunds per vendor
  var returnsByVendor = {};
  (order.refunds || []).forEach(function(refund) {
    (refund.refund_line_items || []).forEach(function(rli) {
      var v = lineItemVendor[rli.line_item_id] || "Unknown";
      returnsByVendor[v] = (returnsByVendor[v] || 0) + parseFloat(rli.subtotal || 0);
    });
  });

  var sub           = Object.values(vs).reduce(function(s,v) { return s+v; }, 0);
  var tax           = parseFloat(order.total_tax || 0);
  var totalDiscount = parseFloat(order.total_discounts || 0);
  var all           = Object.keys(vs);
  var tags          = (order.tags || "").split(",").map(function(t) { return t.trim().toLowerCase(); });
  var isCashOrder   = tags.indexOf("cash") !== -1;
  var paymentTag    = isCashOrder ? "cash" : (tags.indexOf("card") !== -1 ? "card" : "");
  var effectiveRate = isCashOrder ? 0 : FEE_RATE;
  var effectiveFlat = isCashOrder ? 0 : FEE_FLAT;
  var isMixed       = all.filter(function(v) { return v !== ALPENGLOW_VENDOR; }).length > 1 ||
                      (all.indexOf(ALPENGLOW_VENDOR) !== -1 && all.length > 1);

  var vendorData = {};
  all.forEach(function(v) {
    var s            = vs[v];
    var share        = sub > 0 ? s / sub : 0;
    var taxShare     = r2(tax * share);
    var discountShare = r2(totalDiscount * share);
    var returnShare  = r2(returnsByVendor[v] || 0);

    var setting      = getVendorSetting(v);
    var passAlongTax = setting.passAlongTax;
    var taxForNet    = passAlongTax ? taxShare : 0;

    var flat         = isMixed ? effectiveFlat / all.length : effectiveFlat;
    var fee          = r2(flat + effectiveRate * (s - discountShare + taxShare));
    var grossForSplit = r2(s + taxForNet - discountShare - fee - returnShare);
    var commission   = r2(grossForSplit * setting.commissionRate / 100);
    var netPayout    = r2(grossForSplit - commission);

    vendorData[v] = {
      sub: r2(s),
      taxShare: taxShare,
      taxIncluded: passAlongTax,
      discountShare: discountShare,
      returnShare: returnShare,
      totalFeeShare: fee,
      commission: commission,
      netPayout: netPayout
    };
  });

  return {
    orderId: order.name,
    date: order.created_at.slice(0, 10),
    isCashOrder: isCashOrder,
    paymentTag: paymentTag,
    vendorData: vendorData
  };
}

/* ── SUMMARIES ──────────────────────────────────────── */
function buildSummaries(processed) {
  var s = {};
  processed.forEach(function(order) {
    Object.entries(order.vendorData).forEach(function(entry) {
      var v = entry[0]; var d = entry[1];
      if (v === ALPENGLOW_VENDOR) return;
      if (!s[v]) s[v] = { vendor:v, grossSales:0, taxCollected:0, totalDiscounts:0, totalReturns:0, processingFees:0, alpenglowCommission:0, netPayout:0, orderCount:0 };
      s[v].grossSales          = r2(s[v].grossSales          + d.sub);
      s[v].taxCollected        = r2(s[v].taxCollected        + (d.taxIncluded ? d.taxShare : 0));
      s[v].totalDiscounts      = r2(s[v].totalDiscounts      + d.discountShare);
      s[v].totalReturns        = r2(s[v].totalReturns        + d.returnShare);
      s[v].processingFees      = r2(s[v].processingFees      + d.totalFeeShare);
      s[v].alpenglowCommission = r2(s[v].alpenglowCommission + d.commission);
      s[v].netPayout           = r2(s[v].netPayout           + d.netPayout);
      s[v].orderCount++;
    });
  });
  return s;
}

/* ── CSV EXPORT ─────────────────────────────────────── */
function downloadCSV(vendor, processed) {
  var rows = [["Order","Date","Payment","Subtotal","Tax","Fee","Discount","Return","Commission","Net Payout"]];
  processed.filter(function(o) { return o.vendorData[vendor]; }).forEach(function(o) {
    var d = o.vendorData[vendor];
    rows.push([o.orderId, o.date, o.paymentTag||"", d.sub,
      d.taxIncluded ? d.taxShare : 0,
      d.totalFeeShare, d.discountShare, d.returnShare, d.commission, d.netPayout]);
  });
  var csv = rows.map(function(r) { return r.join(","); }).join("\n");
  var a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8," + encodeURIComponent(csv);
  var dateFrom = document.getElementById("dateFrom").value;
  var dateTo   = document.getElementById("dateTo").value;
  a.download = "payout_" + vendor.replace(/\s+/g,"_") + "_" + dateFrom + "_to_" + dateTo + ".csv";
  a.click();
}

/* ── DATE PRESETS ───────────────────────────────────── */
function setDateRange(preset) {
  var now = new Date();
  var y   = now.getFullYear();
  var from, to;
  switch (preset) {
    case 'prev-month':
      from = isoDate(new Date(y, now.getMonth() - 1, 1));
      to   = isoDate(new Date(y, now.getMonth(), 0));
      break;
    case 'ytd':
      from = y + '-01-01';
      to   = isoDate(now);
      break;
    case 'q1': from = y + '-01-01'; to = y + '-03-31'; break;
    case 'q2': from = y + '-04-01'; to = y + '-06-30'; break;
    case 'q3': from = y + '-07-01'; to = y + '-09-30'; break;
    case 'q4': from = y + '-10-01'; to = y + '-12-31'; break;
  }
  document.getElementById('dateFrom').value = from;
  document.getElementById('dateTo').value   = to;
  document.querySelectorAll('.btn-preset').forEach(function(b) { b.classList.remove('active'); });
  var btn = document.getElementById('preset-' + preset);
  if (btn) btn.classList.add('active');
}

function clearActivePreset() {
  document.querySelectorAll('.btn-preset').forEach(function(b) { b.classList.remove('active'); });
}

/* ── PDF EXPORT ─────────────────────────────────────── */
function downloadPDF(vendor, processed) {
  var dateFrom = document.getElementById("dateFrom").value;
  var dateTo   = document.getElementById("dateTo").value;
  var s = (function() {
    var t = {}; processed.filter(function(o) { return o.vendorData[vendor]; }).forEach(function(o) {
      var d = o.vendorData[vendor];
      t.grossSales        = r2((t.grossSales        || 0) + d.sub);
      t.taxCollected      = r2((t.taxCollected      || 0) + (d.taxIncluded ? d.taxShare : 0));
      t.processingFees    = r2((t.processingFees    || 0) + d.totalFeeShare);
      t.totalDiscounts    = r2((t.totalDiscounts    || 0) + d.discountShare);
      t.totalReturns      = r2((t.totalReturns      || 0) + d.returnShare);
      t.alpenglowCommission = r2((t.alpenglowCommission || 0) + d.commission);
      t.netPayout         = r2((t.netPayout         || 0) + d.netPayout);
      t.orderCount        = (t.orderCount || 0) + 1;
    }); return t;
  })();

  var orderRows = processed.filter(function(o) { return o.vendorData[vendor]; }).map(function(o) {
    var d = o.vendorData[vendor];
    var payment = o.paymentTag === 'cash' ? 'Cash' : o.paymentTag === 'card' ? 'Card' : '—';
    return '<tr>' +
      '<td>' + o.orderId + '</td>' +
      '<td>' + o.date + '</td>' +
      '<td>' + payment + '</td>' +
      '<td class="r">' + fmt(d.sub) + '</td>' +
      '<td class="r">' + (d.taxIncluded ? fmt(d.taxShare) : '—') + '</td>' +
      '<td class="r">' + (d.totalFeeShare > 0 ? '−' + fmt(d.totalFeeShare) : '—') + '</td>' +
      '<td class="r">' + (d.discountShare > 0 ? '−' + fmt(d.discountShare) : '—') + '</td>' +
      '<td class="r">' + (d.returnShare > 0   ? '−' + fmt(d.returnShare)   : '—') + '</td>' +
      '<td class="r">' + (d.commission > 0    ? '−' + fmt(d.commission)    : '—') + '</td>' +
      '<td class="r bold green">' + fmt(d.netPayout) + '</td>' +
      '</tr>';
  }).join('');

  var summaryRows = [
    ['Gross Sales', fmt(s.grossSales)],
    s.taxCollected      > 0 ? ['Tax Passed Along',  fmt(s.taxCollected)]           : null,
    s.processingFees    > 0 ? ['Processing Fees',  '−' + fmt(s.processingFees)]    : null,
    s.totalDiscounts    > 0 ? ['Discounts',         '−' + fmt(s.totalDiscounts)]   : null,
    s.totalReturns      > 0 ? ['Returns',           '−' + fmt(s.totalReturns)]     : null,
    s.alpenglowCommission>0 ? ['Commission (Alpenglow)', '−' + fmt(s.alpenglowCommission)] : null,
    ['Net Payout', fmt(s.netPayout)]
  ].filter(Boolean).map(function(row) {
    var isNet = row[0] === 'Net Payout';
    return '<tr' + (isNet ? ' style="font-weight:700;color:#008060;border-top:2px solid #e2e5ea"' : '') + '>' +
      '<td>' + row[0] + '</td><td class="r">' + row[1] + '</td></tr>';
  }).join('');

  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><style>' +
    'body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:12px;color:#1c2033;padding:32px;margin:0}' +
    'h1{font-size:20px;font-weight:700;margin:0 0 2px}' +
    '.sub{font-size:12px;color:#6b7280;margin-bottom:24px}' +
    '.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:#6b7280;margin:24px 0 8px}' +
    'table{width:100%;border-collapse:collapse;margin-bottom:8px}' +
    'th{text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:#6b7280;padding:6px 8px;border-bottom:1.5px solid #e2e5ea}' +
    'td{padding:6px 8px;border-bottom:1px solid #f0f2f5;font-size:11.5px}' +
    'tr:last-child td{border-bottom:none}' +
    '.r{text-align:right;font-variant-numeric:tabular-nums}' +
    '.bold{font-weight:700}.green{color:#008060}' +
    '.summary-table{max-width:320px}' +
    '.summary-table td:first-child{color:#374151}' +
    '.footer{margin-top:32px;font-size:10px;color:#9ca3af;border-top:1px solid #e2e5ea;padding-top:12px}' +
    '</style></head><body>' +
    '<h1>' + vendor + '</h1>' +
    '<div class="sub">Payout Report &nbsp;·&nbsp; ' + dateFrom + ' to ' + dateTo + ' &nbsp;·&nbsp; ' + s.orderCount + ' order' + (s.orderCount !== 1 ? 's' : '') + '</div>' +
    '<div class="section-title">Summary</div>' +
    '<table class="summary-table"><tbody>' + summaryRows + '</tbody></table>' +
    '<div class="section-title">Order Detail</div>' +
    '<table><thead><tr>' +
    '<th>Order</th><th>Date</th><th>Payment</th>' +
    '<th class="r">Subtotal</th><th class="r">Tax</th><th class="r">Fee</th>' +
    '<th class="r">Discount</th><th class="r">Return</th><th class="r">Commission</th><th class="r">Net</th>' +
    '</tr></thead><tbody>' + orderRows + '</tbody></table>' +
    '<div class="footer">Generated ' + new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'}) + ' · Alpenglow Supply Co.</div>' +
    '</body></html>';

  var el = document.createElement('div');
  el.innerHTML = html;
  el.style.position = 'absolute';
  el.style.left = '-9999px';
  document.body.appendChild(el);

  html2pdf().set({
    margin: [12, 12, 12, 12],
    filename: 'payout_' + vendor.replace(/\s+/g,'_') + '_' + dateFrom + '_to_' + dateTo + '.pdf',
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2, useCORS: true },
    jsPDF: { unit: 'mm', format: 'letter', orientation: 'landscape' }
  }).from(el.firstChild).save().then(function() {
    document.body.removeChild(el);
  });
}

/* ── UTILITIES ──────────────────────────────────────── */
function apiFetch(path) {
  return fetch(WORKER_URL + path).then(function(res) {
    if (!res.ok) return res.text().then(function(t) { throw new Error("API error " + res.status + ": " + t); });
    return res.json();
  });
}

function r2(n) { return Math.round(n * 100) / 100; }
function fmt(n) { return new Intl.NumberFormat("en-US", {style:"currency", currency:"USD"}).format(n || 0); }
function showError(msg) {
  var el = document.getElementById("errorBanner");
  el.style.display = msg ? "" : "none";
  el.textContent = msg || "";
}
